:root {
  --paper: #F7F6F2; --card: #FFFFFF; --ink: #26282B; --soft: #6A6E73;
  --line: #E5E3DC; --pine: #175E54; --pine-deep: #0E4139; --signal: #D5442A; --sun: #FFD84D;
  --r: 14px; --shadow: 0 1px 2px rgba(38,40,43,.06), 0 6px 20px rgba(38,40,43,.05);
  --display: "Baloo 2", -apple-system, sans-serif;
  --body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}
* { box-sizing: border-box; margin: 0; }
html { -webkit-text-size-adjust: 100%; }
body { background: var(--paper); color: var(--ink); font-family: var(--body); font-size: 16px; line-height: 1.45; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; -webkit-tap-highlight-color: transparent; }
input, select, textarea { font: inherit; color: inherit; }
:focus-visible { outline: 3px solid var(--pine); outline-offset: 2px; border-radius: 6px; }
@media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }

.app { max-width: 1180px; margin: 0 auto; padding: 0 14px calc(88px + env(safe-area-inset-bottom)); }
.app.wall { font-size: 112%; }
.demobar { background: var(--sun); color: var(--ink); font-size: 13px; font-weight: 600; padding: 7px 14px; margin: 0 -14px; text-align: center; }

/* ── Kopf / Abreißkalender-Masthead ── */
header { padding-top: calc(10px + env(safe-area-inset-top)); }
.mast { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.pagetitle { font-family: var(--display); font-weight: 800; font-size: 26px; letter-spacing: -.01em; padding: 10px 0 2px; }
.tearoff { position: relative; display: inline-flex; flex-direction: column; padding: 10px 18px 12px; margin-top: 6px;
  background: var(--card); border-radius: var(--r); box-shadow: var(--shadow); cursor: pointer;
  border-top: 6px solid var(--signal); }
.t-wd { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--soft); }
.t-num { font-family: var(--display); font-weight: 800; font-size: 54px; line-height: 1; margin: 2px 0; }
.t-mon { font-size: 14px; font-weight: 600; color: var(--soft); }
.t-today { position: absolute; top: 10px; right: -10px; background: var(--sun); font-size: 11px; font-weight: 800;
  text-transform: uppercase; letter-spacing: .08em; padding: 3px 8px; border-radius: 6px; transform: rotate(4deg); }
.mastbtns { display: flex; gap: 6px; padding-top: 10px; }
.iconbtn { display: grid; place-items: center; width: 40px; height: 40px; border-radius: 12px; background: var(--card); box-shadow: var(--shadow); font-size: 20px; }

.toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
.seg { display: inline-flex; background: var(--card); border-radius: 12px; padding: 3px; box-shadow: var(--shadow); }
.seg button { padding: 7px 13px; border-radius: 9px; font-weight: 600; font-size: 14px; color: var(--soft); }
.seg button.on { background: var(--pine); color: #fff; }
.datenav { display: flex; align-items: center; gap: 6px; }
.todaybtn { padding: 8px 14px; border-radius: 12px; background: var(--card); box-shadow: var(--shadow); font-weight: 700; font-size: 14px; }

.filterrow { display: flex; gap: 7px; overflow-x: auto; padding: 12px 2px 4px; scrollbar-width: none; }
.filterrow::-webkit-scrollbar { display: none; }
.pchip { --pc: var(--soft); flex: none; padding: 6px 13px; border-radius: 999px; border: 2px solid var(--pc);
  color: var(--pc); font-weight: 700; font-size: 14px; background: var(--card); }
.pchip.on { background: var(--pc); color: #fff; }
.pchip.fam { --pc: var(--ink); }
.swatch { width: 32px; height: 32px; border-radius: 999px; border: 3px solid transparent; }
.swatch.on { border-color: var(--ink); }

main { margin-top: 14px; }
.sec { font-family: var(--display); font-weight: 700; font-size: 15px; text-transform: uppercase; letter-spacing: .07em;
  color: var(--soft); margin: 16px 0 8px; display: flex; align-items: center; gap: 7px; }
.empty { color: var(--soft); padding: 10px 2px; }
.empty.small { font-size: 13.5px; padding: 4px 2px; }

/* ── Termin-Chips ── */
.chip { --pc: var(--pine); display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
  background: var(--card); border-radius: var(--r); box-shadow: var(--shadow); padding: 10px 12px; margin-bottom: 8px; }
.chip:active { transform: scale(.99); }
.chip-bar { flex: none; width: 5px; align-self: stretch; border-radius: 4px; background: var(--pc); }
.chip-body { flex: 1; min-width: 0; }
.chip-title { display: block; font-weight: 700; font-size: 16px; }
.chip-title .recur { color: var(--soft); font-weight: 400; margin-left: 6px; font-size: 13px; }
.chip-meta { display: block; font-size: 13.5px; color: var(--soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chip.dense { padding: 8px 10px; }
.chip.dense .chip-title { font-size: 14.5px; }
.chip.dense .chip-meta { font-size: 12.5px; }
.dots { display: inline-flex; flex: none; }
.dots i { border-radius: 999px; border: 2px solid var(--card); margin-left: -4px; }
.dot-familie { color: var(--sun); text-shadow: 0 0 1px var(--ink); font-size: 15px; }
.avatar { display: inline-grid; place-items: center; border-radius: 999px; color: #fff; font-weight: 800; text-transform: uppercase; flex: none; }

/* ── Tagesansicht ── */
.dayview section { margin-bottom: 6px; }

/* ── Agenda (Telefon: Woche / 14 Tage) ── */
.agenda-day { margin-bottom: 14px; }
.agenda-head { display: flex; align-items: baseline; gap: 9px; width: 100%; text-align: left; padding: 2px 2px 7px; }
.agenda-head .num { font-family: var(--display); font-weight: 800; font-size: 24px; min-width: 34px; }
.agenda-head .wd { font-weight: 600; color: var(--soft); font-size: 14px; }
.agenda-day.is-today .num { color: var(--signal); }
.agenda-day.is-today .wd { color: var(--signal); font-weight: 800; }
.agenda-empty { color: var(--line); padding-left: 44px; margin-top: -4px; }

/* ── Raster (Woche / 14 Tage / Monat, breite Screens) ── */
.gridweeks { background: var(--card); border-radius: var(--r); box-shadow: var(--shadow); overflow: hidden; }
.grid-head { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--pine); color: #fff; }
.grid-head span { padding: 8px 10px; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: .06em; }
.grid-row { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid var(--line); }
.cell { min-height: 108px; padding: 6px 7px; border-left: 1px solid var(--line); cursor: pointer; }
.cell:first-child { border-left: none; }
.cell.dim { background: #FBFAF7; }
.cell.dim .cellnum { color: var(--line); }
.cellnum { font-family: var(--display); font-weight: 700; font-size: 15px; display: inline-grid; place-items: center; min-width: 26px; height: 26px; border-radius: 999px; }
.cell.is-today .cellnum { background: var(--signal); color: #fff; }
.mini { --pc: var(--pine); display: block; width: 100%; text-align: left; font-size: 12px; line-height: 1.3; padding: 2px 5px 2px 7px;
  border-left: 3px solid var(--pc); border-radius: 4px; margin-top: 3px; background: color-mix(in srgb, var(--pc) 9%, #fff);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini b { font-weight: 700; }
.more { display: block; font-size: 11.5px; color: var(--soft); margin-top: 3px; }

/* ── Familienansicht ── */
.wallclock { text-align: center; padding: 6px 0 16px; }
.clock { display: block; font-family: var(--display); font-weight: 800; font-size: 64px; line-height: 1; }
.clockdate { color: var(--soft); font-weight: 600; }
.famgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 14px; }
.famcol { --pc: var(--pine); background: var(--card); border-radius: var(--r); box-shadow: var(--shadow);
  border-top: 6px solid var(--pc); padding: 12px 12px 14px; }
.famhead { display: flex; align-items: center; gap: 9px; margin-bottom: 4px; }
.famname { font-family: var(--display); font-weight: 800; font-size: 20px; }
.famcol h4 { font-size: 12.5px; text-transform: uppercase; letter-spacing: .08em; color: var(--soft); margin: 12px 0 6px; }
.famcol .chip { box-shadow: none; border: 1px solid var(--line); }

/* ── Aufgaben ── */
.taskgroup { background: var(--card); border-radius: var(--r); box-shadow: var(--shadow); padding: 4px 14px 12px; margin-bottom: 14px; }
.taskrow { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--line); }
.taskrow:last-of-type { border-bottom: none; }
.taskrow input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--pine); flex: none; }
.taskrow.small input[type="checkbox"] { width: 18px; height: 18px; }
.taskrow.done .tasktitle, .taskrow.done span { text-decoration: line-through; color: var(--soft); }
.tasktitle { flex: 1; text-align: left; font-weight: 600; }
.taskrow > span { flex: 1; font-weight: 600; }
.due { font-style: normal; font-size: 12.5px; font-weight: 700; color: var(--soft); background: var(--paper); padding: 3px 8px; border-radius: 6px; flex: none; }
.due.late { color: #fff; background: var(--signal); }
.tdot { display: inline-block; width: 12px; height: 12px; border-radius: 999px; flex: none; }
.ghost { color: var(--pine); font-weight: 700; font-size: 14px; padding: 8px 2px; }
.ghost.danger { color: var(--signal); }

/* ── FAB + Bottom-Navigation ── */
.fab { position: fixed; right: 18px; bottom: calc(78px + env(safe-area-inset-bottom)); width: 58px; height: 58px;
  border-radius: 999px; background: var(--pine); color: #fff; font-size: 30px; line-height: 1;
  box-shadow: 0 6px 18px rgba(23,94,84,.4); z-index: 30; }
.fab:active { background: var(--pine-deep); }
.bottomnav { position: fixed; left: 0; right: 0; bottom: 0; display: flex; justify-content: space-around;
  background: rgba(255,255,255,.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--line); padding: 6px 8px calc(8px + env(safe-area-inset-bottom)); z-index: 25; }
.bottomnav button { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 11.5px; font-weight: 700;
  color: var(--soft); padding: 4px 16px; border-radius: 12px; }
.bottomnav button.on { color: var(--pine); background: color-mix(in srgb, var(--pine) 10%, #fff); }

/* ── Sheets / Modals ── */
.scrim { position: fixed; inset: 0; background: rgba(38,40,43,.44); z-index: 50; display: flex; align-items: flex-end; justify-content: center; }
.sheet { background: var(--paper); width: 100%; max-width: 560px; max-height: 92vh; border-radius: 20px 20px 0 0;
  display: flex; flex-direction: column; animation: up .18s ease-out; }
@keyframes up { from { transform: translateY(24px); opacity: .6; } to { transform: none; opacity: 1; } }
.sheet-head { display: flex; align-items: center; gap: 10px; padding: 16px 18px 8px; }
.sheet-head h2 { font-family: var(--display); font-weight: 800; font-size: 21px; flex: 1; }
.x { width: 34px; height: 34px; border-radius: 999px; background: var(--card); box-shadow: var(--shadow); font-size: 15px; flex: none; }
.sheet-body { padding: 6px 18px 18px; overflow-y: auto; }
.sheet-foot { display: flex; gap: 10px; padding: 12px 18px calc(16px + env(safe-area-inset-bottom)); border-top: 1px solid var(--line); }
.f { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; flex: 1; }
.f > span { font-size: 13px; font-weight: 700; color: var(--soft); }
.f input, .f select, .f textarea { border: 1.5px solid var(--line); border-radius: 10px; padding: 10px 12px; background: var(--card); width: 100%; }
.f.check { flex-direction: row; align-items: center; gap: 9px; }
.f.check input { width: 22px; height: 22px; accent-color: var(--pine); }
.f.check span { font-size: 15px; color: var(--ink); font-weight: 600; }
.frow { display: flex; gap: 12px; }
.chiprow { display: flex; flex-wrap: wrap; gap: 7px; }
.primary { background: var(--pine); color: #fff; font-weight: 800; padding: 11px 22px; border-radius: 12px; }
.primary:disabled { opacity: .45; }
.primary.big { width: 100%; padding: 14px; font-size: 17px; }
.danger { color: var(--signal); font-weight: 700; }
.profrow { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--line); }
.profname { flex: 1; font-weight: 700; }
.searchinput { flex: 1; border: none; background: var(--card); border-radius: 12px; padding: 11px 14px; box-shadow: var(--shadow); font-size: 16px; }
.sheet.search { border-radius: 20px; margin: auto 14px; max-height: 80vh; align-self: center; }

/* ── PIN ── */
.pinscreen { min-height: 100vh; display: grid; place-items: center; padding: 20px; }
.pincard { background: var(--card); border-radius: 20px; box-shadow: var(--shadow); border-top: 8px solid var(--signal);
  padding: 28px 26px; width: 100%; max-width: 380px; text-align: center; }
.logo { font-family: var(--display); font-weight: 800; font-size: 34px; line-height: 1.05; margin-bottom: 12px; }
.pincard p { color: var(--soft); font-size: 14.5px; margin-bottom: 16px; }
.pincard input { width: 100%; text-align: center; font-size: 26px; letter-spacing: .3em; border: 1.5px solid var(--line);
  border-radius: 12px; padding: 12px; margin-bottom: 12px; }
.err { color: var(--signal); font-weight: 700; }

/* ── Breit (Tablet quer / Desktop) ── */
@media (min-width: 760px) {
  .scrim { align-items: center; }
  .sheet { border-radius: 20px; margin: 20px; }
  .t-num { font-size: 64px; }
  .cell { min-height: 120px; }
}
/* Wandmodus: alles etwas größer */
.app.wall .chip-title { font-size: 17.5px; }
.app.wall .clock { font-size: 84px; }
.app.wall .cell { min-height: 132px; }

</style>
